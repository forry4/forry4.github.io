name: Deploy Backend to Render

on:
  push:
    branches: [main]
    paths:
      - 'app.py'   # composition root — creates the FastAPI app + mounts the features
      - 'core/**/*.py'   # shared DB + auth layer imported by main + coc + books
      - 'games/spender/main.py'
      - 'books/**'
      - 'games/spender/requirements.txt'
      - 'games/spender/app.py'
      - 'games/spender/Dockerfile'
      - 'games/spender/ai/az_model.npz'
      - 'games/spender/ai/az/**/*.py'   # serving imports: heuristic, valuation, engine, actions, mcts, infer_np
      - 'games/spender/ai/weights*.json'   # variants A/B/C/C2 — loaded at import (main.load_weights)
      - 'games/spender/ai/value_model.json'   # value-leaf model — loaded at import (main.load_value_model)
      - 'games/castles_of_crimson/**/*.py'
      - 'games/wherewolf/**/*.py'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render deploy
        run: |
          response=$(curl -s -o /dev/null -w "%{http_code}" "${{ secrets.RENDER_DEPLOY_HOOK }}")
          echo "Render response: $response"
          [ "$response" = "200" ] || [ "$response" = "202" ] || { echo "Deploy hook failed with status $response"; exit 1; }
