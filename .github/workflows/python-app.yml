name: Python CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r games/spender/requirements.txt
      - name: Run tests
        run: |
          python -m pytest core/tests/ games/spender/tests/ books/tests/ games/castles_of_crimson/tests/ -q
