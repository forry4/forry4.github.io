<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#242018"/>
      <stop offset="1" stop-color="#0f0e0c"/>
    </linearGradient>
    <linearGradient id="leaf" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#e8c96a"/>
      <stop offset="1" stop-color="#c9a84c"/>
    </linearGradient>
  </defs>
  <!-- dark rounded-square plate with a gold rim (matches the site panels) -->
  <rect x="2.5" y="2.5" width="59" height="59" rx="13" fill="url(#bg)" stroke="#c9a84c" stroke-width="2.5"/>
  <!-- trunk (tapered, slight root flare) -->
  <path d="M30 35 H34 L35.6 52 H28.4 Z" fill="#bfa24e"/>
  <!-- crown: overlapping circles read as one tree at any size -->
  <g fill="url(#leaf)">
    <circle cx="32" cy="17" r="11"/>
    <circle cx="21" cy="27" r="10.5"/>
    <circle cx="43" cy="27" r="10.5"/>
    <circle cx="32" cy="28" r="13.5"/>
  </g>
  <!-- soft top-left sheen -->
  <circle cx="26.5" cy="14.5" r="3" fill="#f0d98a" opacity="0.55"/>
</svg>
