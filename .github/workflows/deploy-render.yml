name: Deploy Backend to Render

on:
  push:
    branches: [main]
    paths:
      - 'games/spender/main.py'
      - 'games/spender/requirements.txt'
      - 'games/spender/app.py'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render deploy
        run: curl -s "${{ secrets.RENDER_DEPLOY_HOOK }}"
