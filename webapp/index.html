<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <!-- favicon / bookmark icon. %BASE_URL% expands to the Vite build base (/ for the
         forry4.github.io root site; overridable via VITE_BASE), so the path stays
         correct under any base. Files live in webapp/public/. -->
    <link rel="icon" type="image/svg+xml" href="%BASE_URL%favicon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="%BASE_URL%favicon-32.png" />
    <link rel="apple-touch-icon" href="%BASE_URL%apple-touch-icon.png" />
    <!-- Load the site fonts in <head> (NOT only via the JS-injected @import in baseCss) so
         they're ready at first paint. Otherwise on reload the page paints in the fallback
         serif first, then Cinzel/Crimson (wider, letter-spaced) swap in — the "tighter then
         snaps wider" layout shift. On reload the font files are cached, so the <link> applies
         instantly = no swap. The inline dark bg avoids a white flash before the JS CSS loads. -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Crimson+Pro:ital,wght@0,300;0,400;1,300&display=swap" />
    <style>html,body{margin:0;background:#0f0e0c}</style>
    <title>Forrest Games</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/main.jsx"></script>
  </body>
</html>
