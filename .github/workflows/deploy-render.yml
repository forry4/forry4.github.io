name: Deploy Backend to Render

on:
  push:
    branches: [main]
    paths:
      - 'games/spender/main.py'
      - 'games/spender/requirements.txt'
      - 'games/spender/app.py'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render deploy
        run: |
          response=$(curl -s -o /dev/null -w "%{http_code}" "${{ secrets.RENDER_DEPLOY_HOOK }}")
          echo "Render response: $response"
          [ "$response" = "200" ] || [ "$response" = "202" ] || { echo "Deploy hook failed with status $response"; exit 1; }
