services:
  - type: web
    name: spender-backend
    env: python
    plan: free
    branch: main
    buildCommand: "pip install -r games/spender/requirements.txt"
    startCommand: "python -m uvicorn games.spender.app:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PYTHONUNBUFFERED
        value: "1"
