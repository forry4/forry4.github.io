<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>Spender — Demo Client</title>
  <meta name="description" content="Lightweight WebSocket demo client for Spender game" />
  <style>
    :root{
      --bg:#0f1115; --panel:#16181d; --muted:#9aa3b2; --accent:#7c5cff; --success:#3ddc84; --danger:#ff6b6b; --glass: rgba(255,255,255,0.03);
      --radius:10px; --mono: ui-monospace, SFMono-Regular, Menlo, Monaco, "Roboto Mono", "Segoe UI Mono";
    }
    html,body{height:100%;}
    body{
      margin:0; font-family: Inter, system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial; background:linear-gradient(180deg,var(--bg),#0b0c0e); color:#e6eef8; -webkit-font-smoothing:antialiased;
      /* keep the page anchored to the top on small screens so headers aren't hidden by UI chrome/keyboard */
      display:flex; align-items:flex-start; justify-content:center; padding:1rem; -webkit-text-size-adjust:100%;
      min-height:100vh; /* ensure the gradient/background covers the full viewport */
      padding-top:calc(env(safe-area-inset-top, 0px) + 1rem);
      padding-bottom:calc(env(safe-area-inset-bottom, 0px) + 1rem);
      padding-left:calc(env(safe-area-inset-left, 0px) + 1rem);
      padding-right:calc(env(safe-area-inset-right, 0px) + 1rem);
    }
    .wrap{ width:100%; max-width:980px; }
  header{display:flex; gap:1rem; align-items:center; margin-bottom:1rem; padding-top:0.25rem}
    .logo{width:56px;height:56px;border-radius:12px;background:linear-gradient(135deg,var(--accent),#5fd3ff);display:flex;align-items:center;justify-content:center;color:#071023;font-weight:700;font-size:20px}
    h1{margin:0;font-size:1.25rem}
    p.lead{margin:0;color:var(--muted);font-size:0.95rem}

  .panel{background:linear-gradient(180deg,var(--panel), rgba(22,24,29,0.9)); border-radius:var(--radius); padding:1rem; box-shadow: 0 6px 30px rgba(2,6,23,0.6); width:100%; overflow:visible; padding-bottom:1.25rem}
    .grid{display:grid;grid-template-columns:1fr 360px; gap:1rem}
  .controls{display:flex;flex-direction:column;gap:0.6rem}
    label{font-size:0.85rem;color:var(--muted)}
    input[type=text], input[type=url], select{background:var(--glass); border:1px solid rgba(255,255,255,0.04); color:inherit; padding:0.6rem 0.75rem; border-radius:8px}
  .row{display:flex;gap:0.5rem;flex-wrap:wrap;align-items:center}
  .row > *{min-width:0}
  .col-fixed{width:170px}
    button{background:linear-gradient(180deg,var(--accent),#6d4bff); color:#061028; border:none; padding:0.6rem 0.85rem; border-radius:8px; cursor:pointer; font-weight:600; -webkit-tap-highlight-color: transparent; touch-action: manipulation}
    button.secondary{background:transparent;color:var(--muted);border:1px solid rgba(255,255,255,0.04)}

    /* Mobile first improvements: larger touch targets */
    @media (max-width:600px){
      button, input[type=text], input[type=url], select { font-size:16px; padding:12px 14px; }
      .logo{width:48px;height:48px;font-size:18px}
      .wrap{padding:0.5rem}
      .actions{gap:0.4rem}
      /* make action buttons stack and fill the panel width on small screens */
      .actions{flex-direction:column}
      .actions button, .actions input, .row > button{width:100%; box-sizing:border-box}
      /* make the previously fixed-width column expand to full width on small screens */
      .col-fixed{width:100%}
    }
  .actions{display:flex;gap:0.5rem;flex-wrap:wrap}

    .log{background:#05060a;border-radius:8px;padding:0.5rem;height:420px;overflow:auto;font-family:var(--mono);font-size:13px;color:var(--muted);border:1px solid rgba(255,255,255,0.03)}
    .log .line{padding:0.25rem 0.35rem;border-bottom:1px dashed rgba(255,255,255,0.02)}
    .status{font-size:0.85rem;color:var(--muted);}

    footer{margin-top:1rem;color:var(--muted);font-size:0.85rem;text-align:center}

    @media(max-width:900px){ .grid{grid-template-columns:1fr; } .log{height:260px} }
    @media (max-width:420px){
      .log{height:200px;font-size:14px}
      .controls { gap:0.5rem }
      /* slightly reduce header size to avoid clipping on very small screens */
      h1{font-size:1.05rem}
      p.lead{font-size:0.9rem}
    }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <div class="logo">SP</div>
      <div>
        <h1>Spender — Demo Client</h1>
        <p class="lead">A lightweight WebSocket client to create/join rooms and exercise the Spender game server.</p>
      </div>
    </header>

    <div class="panel grid">
      <div>
        <div class="controls">
          <div>
            <label>Backend</label>
            <div class="row">
              <div style="flex:1">
                <div id="backendDisplay" style="background:var(--glass);padding:0.5rem;border-radius:8px;color:var(--muted)">Auto-detecting…</div>
              </div>
              <button id="showSettings" class="secondary">Settings</button>
            </div>
            <div id="backendSettings" style="display:none;margin-top:0.6rem">
              <input id="backendInput" type="url" placeholder="wss://your-backend.onrender.com" style="width:100%" />
              <div style="margin-top:0.5rem"><button id="saveBackend" class="secondary">Use this backend</button></div>
            </div>
          </div>

          <div class="row">
            <div style="flex:1">
              <label for="player">Player ID</label>
              <input id="player" type="text" placeholder="P1" />
            </div>
            <div class="col-fixed">
              <label for="name">Display name</label>
              <input id="name" type="text" placeholder="Player" />
            </div>
          </div>

          <div class="row">
            <button id="create">Create Room</button>
            <input id="room" type="text" placeholder="room id (or created)" style="flex:1" />
            <button id="join" class="secondary">Join Room</button>
          </div>

          <!-- Quick Connect for mobile users: creates a short room and connects as P1 -->
          <div style="margin-top:0.5rem">
            <button id="quickConnect" class="secondary" style="display:none;">Quick Connect</button>
          </div>

          <div class="actions">
            <button id="start" class="secondary">Start Game</button>
            <button id="take" class="secondary">Take Gems</button>
            <button id="buy" class="secondary">Buy</button>
            <input id="cardid" type="text" placeholder="card id (for buy)" style="min-width:220px" />
          </div>

          <div style="margin-top:0.5rem">
            <div class="status">Connection: <span id="conn">idle</span></div>
          </div>
        </div>
      </div>

      <div>
        <div class="log" id="log" aria-live="polite"></div>
      </div>
    </div>

    <footer>
      Built for quick testing — the full game client lives in the project source.
    </footer>
  </div>

  <!-- Default backend for the demo: points the Pages client to your Render deployment so users don't need to enter it -->
  <script>window.__BACKEND_URL = 'wss://splendid-nelz.onrender.com';</script>
  <script>
  // minimal client behavior (same features, cleaner logs)
  const logEl = document.getElementById('log');
  const connEl = document.getElementById('conn');
  function appendLine(text, cls){ const d = document.createElement('div'); d.className='line'; d.textContent = text; if(cls) d.style.color = cls; logEl.appendChild(d); logEl.scrollTop = logEl.scrollHeight; }

  let ws = null; let base = '';
  const backendDisplay = document.getElementById('backendDisplay');
  const backendSettings = document.getElementById('backendSettings');
  const backendInput = document.getElementById('backendInput');
  document.getElementById('showSettings').addEventListener('click', () => { backendSettings.style.display = backendSettings.style.display === 'none' ? 'block' : 'none'; });
  document.getElementById('saveBackend').addEventListener('click', () => { const v = backendInput.value.trim(); if(!v) return; base = v; backendDisplay.textContent = base; appendLine('backend set to ' + base); backendSettings.style.display = 'none'; });

  function getQueryParam(name){ try{ const params = new URLSearchParams(window.location.search); return params.get(name); }catch(e){return null} }

  // probe a websocket URL and resolve true if it opens within timeout
  function probeWs(url, timeout=2000){ return new Promise((resolve) => {
    let resolved = false; let s;
    try{ s = new WebSocket(url); }catch(e){ return resolve(false); }
    const t = setTimeout(() => { try{ s.close(); }catch(_){} if(!resolved){ resolved=true; resolve(false); } }, timeout);
    s.onopen = () => { if(!resolved){ resolved=true; clearTimeout(t); try{ s.close(); }catch(_){} resolve(true); } }
    s.onerror = () => { if(!resolved){ resolved=true; clearTimeout(t); try{ s.close(); }catch(_){} resolve(false); } }
    s.onclose = () => { /* ignore */ }
  }); }

  async function chooseBackendCandidate(){
    // 1) URL param ?backend=...
    const q = getQueryParam('backend'); if(q) return q;
    // 2) global override (optional): window.__BACKEND_URL
    if(window.__BACKEND_URL) return window.__BACKEND_URL;
    // 3) probe candidates: same-origin, localhost, 127.0.0.1
    const proto = location.protocol === 'https:' ? 'wss' : 'ws';
    const hostCandidate = proto + '://' + location.host; // same host
    const candidates = [hostCandidate, 'wss://localhost:8000', 'ws://127.0.0.1:8000', 'ws://localhost:8000'];
    for(const c of candidates){
      // keep probing logs minimal on mobile
      if(window.innerWidth > 480) appendLine('probing ' + c + ' ...');
      const ok = await probeWs(c);
      if(ok) return c;
    }
    return null;
  }

  // Auto-run detection on page load so visitors don't have to click anything.
  (async function autoDetectBackendOnLoad(){
    try{
      // small delay to let the UI render
      await new Promise(r => setTimeout(r, 250));
      const chosen = await chooseBackendCandidate();
      if(chosen){ base = chosen; backendDisplay.textContent = base; appendLine('backend auto-detected: ' + base); }
      else { backendDisplay.textContent = 'manual required'; backendSettings.style.display = 'block'; appendLine('no backend auto-detected — open Settings to set one', 'var(--muted)'); }
    }catch(e){ console.warn('auto-detect failed', e); backendDisplay.textContent = 'manual required'; backendSettings.style.display = 'block'; }
  })();
  function endpoint(room, player){ return (base || '').replace(/^http/,'ws').replace(/\/+$/,'') + '/ws/' + encodeURIComponent(room) + '/' + encodeURIComponent(player); }

  document.getElementById('create').addEventListener('click', async () => {
    const player = (document.getElementById('player').value || 'P1').trim(); const name = (document.getElementById('name').value || 'Player').trim();
    const rid = Math.random().toString(36).slice(2,6).toUpperCase(); document.getElementById('room').value = rid;
    if(!base){ const chosen = await chooseBackendCandidate(); if(chosen){ base = chosen; backendDisplay.textContent = base; appendLine('backend detected: ' + base); } else { backendDisplay.textContent = 'manual required'; backendSettings.style.display = 'block'; appendLine('no backend auto-detected — open Settings to set one', 'var(--muted)'); return; } }
    connect(rid, player, () => send({action:'create', name}));
  });

  document.getElementById('join').addEventListener('click', async () => {
    const player = (document.getElementById('player').value || 'P2').trim(); const name = (document.getElementById('name').value || 'Player').trim(); const rid = document.getElementById('room').value.trim();
    if(!rid) return alert('Set room');
    if(!base){ const chosen = await chooseBackendCandidate(); if(chosen){ base = chosen; backendDisplay.textContent = base; appendLine('backend detected: ' + base); } else { backendDisplay.textContent = 'manual required'; backendSettings.style.display = 'block'; appendLine('no backend auto-detected — open Settings to set one', 'var(--muted)'); return; } }
    connect(rid, player, () => send({action:'join', room_id:rid, name}));
  });

  // Quick connect helper: create a random room and connect as P1.
  function isMobile(){ return /Mobi|Android|iPhone|iPad|iPod/i.test(navigator.userAgent) || window.innerWidth < 600 }
  const quickBtn = document.getElementById('quickConnect');
  quickBtn.addEventListener('click', async () => {
    const player = 'P1'; const name = 'MobilePlayer';
    const rid = Math.random().toString(36).slice(2,6).toUpperCase(); document.getElementById('room').value = rid;
    if(!base){ const chosen = await chooseBackendCandidate(); if(chosen){ base = chosen; backendDisplay.textContent = base; appendLine('backend detected: ' + base); } else { backendDisplay.textContent = 'manual required'; backendSettings.style.display = 'block'; appendLine('no backend auto-detected — open Settings to set one', 'var(--muted)'); return; } }
    connect(rid, player, () => send({action:'create', name}));
  });

  // show quick connect on mobile
  if(isMobile()){ quickBtn.style.display = 'inline-block'; }

  function setStatus(s, color){ connEl.textContent = s; connEl.style.color = color || 'var(--muted)'; }

  function connect(room, player, onopen){
    if(ws){ try{ ws.close(); }catch(e){} }
    const url = endpoint(room, player);
    appendLine('Connecting ' + url);
    try{ ws = new WebSocket(url); }catch(e){ appendLine('WebSocket error: '+ e, 'var(--danger)'); setStatus('error', 'var(--danger)'); return }
    ws.onopen = () => {
      appendLine('connected', 'var(--success)'); setStatus('connected', 'var(--success)');
      // attempt reconnect if we have a saved token for this room/player
      try{
        const key = 'spender_token_' + room + '_' + player;
        const tok = localStorage.getItem(key);
        if(tok){ appendLine('attempting reconnect with token'); ws.send(JSON.stringify({action:'reconnect', room_id: room, token: tok})); }
      }catch(e){}
      onopen && onopen();
    }
    ws.onmessage = (ev) => {
      appendLine('recv: ' + ev.data);
      try{
        const msg = JSON.parse(ev.data);
        const rt = msg.room && msg.room.reconnect_tokens;
        if(rt && rt[player]){
          try{ localStorage.setItem('spender_token_' + msg.room.room_id + '_' + player, rt[player]); appendLine('saved reconnect token'); }catch(e){}
        }
      }catch(e){}
    }
    ws.onclose = () => { appendLine('closed'); setStatus('closed', 'var(--muted)'); }
    ws.onerror = (e) => { appendLine('error'); setStatus('error', 'var(--danger)'); }
  }

  function send(obj){ if(!ws || ws.readyState !== WebSocket.OPEN) { appendLine('ws not open', 'var(--muted)'); return } const s = JSON.stringify(obj); appendLine('send: ' + s); ws.send(s); }

  document.getElementById('start').addEventListener('click', () => { const rid = document.getElementById('room').value.trim(); send({action:'start', room_id:rid}); });
  document.getElementById('take').addEventListener('click', () => { const rid = document.getElementById('room').value.trim(); send({action:'move', room_id:rid, move:{type:'take_gems', colors:['blue','green','red']}}); });
  document.getElementById('buy').addEventListener('click', () => { const rid = document.getElementById('room').value.trim(); send({action:'move', room_id:rid, move:{type:'buy', card_id:document.getElementById('cardid').value||null}}); });

  // a little helper: clear log on double-click
  logEl.addEventListener('dblclick', () => { logEl.innerHTML = ''; appendLine('log cleared'); });
  </script>
</body>
</html>
