name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'webapp/**'
      - 'games/spender/**'
      - 'games/castles_of_crimson/**'
      - 'books/**'
      - 'shared/**'
      - '.github/workflows/deploy-pages.yml'

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: webapp
        run: npm install

      # Gate the deploy: build the app, load it in a headless browser, and fail if
      # the page is blank / throws (e.g. a stray backtick in the CSS template). This
      # runs BEFORE the real Build step so its throwaway build can't ship.
      - name: Install browser for smoke test
        working-directory: webapp
        run: npx playwright install --with-deps chromium

      - name: Smoke test (app must render, no blank page)
        working-directory: webapp
        run: npm run smoke

      - name: Build
        working-directory: webapp
        env:
          VITE_WS_URL: wss://splendid-nelz.onrender.com/ws
        run: npm run build

      - name: Deploy to docs/
        run: |
          rm -rf docs/
          cp -r webapp/dist/ docs/
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          git diff --cached --quiet || git commit -m "deploy: update GitHub Pages from Vite build [skip ci]"
          git push
